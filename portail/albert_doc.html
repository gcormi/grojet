<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Albert Express - Générateur de Documents</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap');
        body { font-family: 'Outfit', sans-serif; background: #f0f2f5; }
        .glass { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
        .loader { border-top-color: #000091; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f1f1; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="p-4 md:p-8 min-h-screen flex items-center justify-center">

    <div class="max-w-2xl w-full glass rounded-3xl shadow-2xl overflow-hidden border border-white">
        <!-- Header -->
        <div class="bg-[#000091] p-6 text-white text-center">
            <h1 class="text-2xl font-extrabold tracking-tight italic">ALBERTDOC <span class="font-light">PRO</span></h1>
            <p class="text-blue-200 text-[10px] uppercase font-bold tracking-widest mt-1">Édition Spéciale Forge des Communs</p>
        </div>

        <div class="p-8 space-y-6">
            <!-- Etape 1 : Clé -->
            <div id="step-key" class="space-y-4">
                <div class="flex flex-col gap-1">
                    <label class="block text-[10px] font-black text-slate-400 uppercase tracking-wider">Clé API Albert</label>
                    <input type="password" id="apiKey" class="w-full p-4 bg-slate-100 border-2 border-transparent focus:border-blue-600 rounded-2xl outline-none transition-all font-mono text-sm" placeholder="sk-...">
                </div>
                <button onclick="saveKey()" class="w-full bg-blue-600 text-white font-bold py-4 rounded-2xl hover:bg-blue-700 transition-all shadow-lg active:scale-95">
                    CONFIGURER L'ACCÈS
                </button>
            </div>

            <!-- Etape 2 : Création -->
            <div id="step-create" class="hidden space-y-6">
                <div class="flex justify-between items-center bg-slate-50 p-3 rounded-xl border border-slate-200">
                    <div class="flex items-center gap-2">
                        <div class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></div>
                        <span class="text-[10px] font-bold text-slate-600 uppercase">Service Opérationnel</span>
                    </div>
                    <button onclick="resetKey()" class="text-[9px] font-bold text-red-400 uppercase hover:text-red-600">Effacer la clé</button>
                </div>

                <!-- Réglage de connexion (CORS) -->
                <div class="p-4 bg-amber-50 rounded-2xl border border-amber-100">
                    <label class="block text-[10px] font-black text-amber-600 uppercase mb-2">Mode de transport (Sécurité)</label>
                    <select id="transportMode" class="w-full p-2 bg-white border border-amber-200 rounded-lg text-xs font-bold text-amber-900 outline-none">
                        <option value="direct">Connexion Directe (Standard Forge)</option>
                        <option value="corsproxy">Passage par Relais (corsproxy.io)</option>
                        <option value="allorigins">Passage par Relais (allorigins)</option>
                    </select>
                </div>

                <div class="space-y-3">
                    <label class="block text-[10px] font-black text-slate-400 uppercase tracking-wider">Sujet du cours à générer</label>
                    <input type="text" id="subject" class="w-full p-4 bg-slate-100 border-2 border-transparent focus:border-blue-600 rounded-2xl outline-none text-sm" placeholder="Ex: Les énergies renouvelables en 3ème">
                </div>

                <button id="genBtn" onclick="generate()" class="w-full bg-slate-900 text-white font-black py-5 rounded-2xl hover:bg-black shadow-xl transition-all flex items-center justify-center gap-3 uppercase tracking-widest text-xs">
                    <i class="fas fa-rocket"></i> Lancer la rédaction
                </button>
            </div>

            <!-- Zone de chargement -->
            <div id="loading" class="hidden flex flex-col items-center py-10 space-y-4">
                <div class="w-12 h-12 border-4 border-slate-200 border-t-blue-600 rounded-full animate-spin"></div>
                <p class="text-xs font-bold text-slate-500 animate-pulse uppercase tracking-widest">Albert analyse et rédige...</p>
            </div>

            <!-- Résultat -->
            <div id="result" class="hidden space-y-4">
                <div class="flex justify-between items-center">
                    <h3 class="text-[10px] font-black text-slate-400 uppercase">Document Pédagogique</h3>
                    <button onclick="downloadDoc()" class="text-blue-600 font-bold text-[10px] hover:underline uppercase flex items-center gap-1">
                        <i class="fas fa-file-export"></i> Exporter HTML
                    </button>
                </div>
                <div id="output" class="p-6 border-2 border-slate-100 rounded-3xl bg-white text-sm prose max-w-none shadow-inner custom-scrollbar overflow-y-auto max-h-[500px]"></div>
                <button onclick="location.reload()" class="w-full py-3 text-slate-400 text-[10px] font-bold uppercase tracking-widest hover:text-slate-600 transition-colors">
                    <i class="fas fa-redo mr-1"></i> Créer une autre fiche
                </button>
            </div>

            <!-- Diagnostic en cas d'erreur -->
            <div id="diag-area" class="hidden mt-6 p-4 bg-red-50 border-2 border-red-100 rounded-2xl">
                <p class="text-[10px] font-black text-red-700 uppercase mb-2 italic">Rapport technique d'échec</p>
                <div id="diag-text" class="text-[9px] text-red-600 font-mono leading-relaxed whitespace-pre-wrap"></div>
                <div class="mt-4 text-[9px] text-red-500 leading-tight">
                    <strong>Conseil :</strong> Si "Failed to fetch" persiste, changez le "Mode de transport" ci-dessus et réessayez.
                </div>
            </div>
        </div>
    </div>

    <script>
        const STORAGE_KEY = 'albert_mini_key_pro';
        
        window.onload = () => {
            const saved = localStorage.getItem(STORAGE_KEY);
            if (saved) {
                document.getElementById('step-key').classList.add('hidden');
                document.getElementById('step-create').classList.remove('hidden');
                document.getElementById('apiKey').value = saved;
            }
        };

        function saveKey() {
            const key = document.getElementById('apiKey').value.trim();
            if(!key) return;
            localStorage.setItem(STORAGE_KEY, key);
            document.getElementById('step-key').classList.add('hidden');
            document.getElementById('step-create').classList.remove('hidden');
        }

        function resetKey() {
            localStorage.removeItem(STORAGE_KEY);
            location.reload();
        }

        async function generate() {
            const subject = document.getElementById('subject').value.trim();
            const key = localStorage.getItem(STORAGE_KEY);
            const mode = document.getElementById('transportMode').value;
            if(!subject) return;

            const btn = document.getElementById('genBtn');
            const loader = document.getElementById('loading');
            const resArea = document.getElementById('result');
            const diagArea = document.getElementById('diag-area');
            const diagTxt = document.getElementById('diag-text');

            btn.classList.add('hidden');
            loader.classList.remove('hidden');
            diagArea.classList.add('hidden');
            resArea.classList.add('hidden');

            const baseUrl = "https://albert.api.gouv.fr/v1/chat/completions";
            let targetUrl = baseUrl;

            // Gestion des Proxys
            if (mode === 'corsproxy') targetUrl = `https://corsproxy.io/?${encodeURIComponent(baseUrl)}`;
            if (mode === 'allorigins') targetUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(baseUrl)}`;

            try {
                const response = await fetch(targetUrl, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${key}`
                    },
                    body: JSON.stringify({
                        model: "openai/gpt-oss-120b",
                        messages: [
                            { role: "system", content: "Tu es un expert en pédagogie française. Rédige une fiche de synthèse structurée en HTML. Utilise des balises <h2>, <h3>, <p>, <ul> et <li>." },
                            { role: "user", content: `Génère une fiche de cours détaillée pour des élèves sur : ${subject}` }
                        ],
                        temperature: 0.7
                    })
                });

                if (response.ok) {
                    const data = await response.json();
                    document.getElementById('output').innerHTML = data.choices[0].message.content;
                    resArea.classList.remove('hidden');
                } else {
                    const errBody = await response.text();
                    throw new Error(`Réponse Albert : ${response.status} - ${errBody.substring(0, 50)}`);
                }
            } catch (e) {
                diagArea.classList.remove('hidden');
                diagTxt.innerText = `Erreur : ${e.message}\nCible : ${targetUrl}\nMode : ${mode}`;
                btn.classList.remove('hidden');
            } finally {
                loader.classList.add('hidden');
            }
        }

        function downloadDoc() {
            const content = document.getElementById('output').innerHTML;
            const fullHtml = `
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <style>
        body { font-family: sans-serif; line-height: 1.6; color: #333; max-width: 800px; margin: 40px auto; padding: 20px; }
        h2 { color: #000091; border-bottom: 2px solid #000091; padding-bottom: 5px; }
        h3 { color: #2563eb; }
        ul { background: #f8fafc; padding: 20px 40px; border-radius: 10px; }
    </style>
</head>
<body>${content}</body>
</html>`;
            const blob = new Blob([fullHtml], {type: 'text/html'});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'cours_albert.html';
            a.click();
        }
    </script>
</body>
</html>
