<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Favoris IA | Portail</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
    <style>
        :root { --accent: #6366f1; --accent-light: #eef2ff; --bg: #f8fafc; --text: #0f172a; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        .header { background: white; border-bottom: 2px solid #f1f5f9; padding: 12px 24px; display: flex; align-items: center; justify-content: space-between; z-index: 100; }
        .header-left { display: flex; align-items: center; gap: 16px; }
        .logo-box { width: 38px; height: 38px; background: linear-gradient(135deg, var(--accent), #8b5cf6); border-radius: 10px; display: flex; align-items: center; justify-content: center; color: white; box-shadow: 0 4px 10px rgba(99,102,241,0.2); }
        .app-info h1 { font-family: 'Outfit', sans-serif; font-size: 1rem; font-weight: 800; margin-bottom: 2px; }
        .sync-label { display: flex; align-items: center; gap: 6px; font-size: 0.72rem; font-weight: 700; color: #94a3b8; }
        .dot { width: 8px; height: 8px; border-radius: 50%; background: #fbbf24; }
        .dot.online { background: #22c55e; box-shadow: 0 0 8px #22c55e; }
        .dot.error { background: #ef4444; }

        .main-view { flex: 1; display: flex; overflow: hidden; }
        .sidebar { width: 250px; background: white; border-right: 2px solid #f1f5f9; padding: 20px; overflow-y: auto; }
        .folder-btn { width: 100%; padding: 10px 12px; border-radius: 10px; border: none; background: none; text-align: left; font-size: 0.85rem; font-weight: 600; color: #64748b; cursor: pointer; display: flex; align-items: center; gap: 10px; transition: 0.2s; margin-bottom: 5px; }
        .folder-btn:hover { background: #f8fafc; color: var(--accent); }
        .folder-btn.active { background: var(--accent-light); color: var(--accent); }

        .content { flex: 1; padding: 24px; overflow-y: auto; display: flex; flex-direction: column; gap: 24px; max-width: 1100px; margin: 0 auto; width: 100%; }
        .add-area { background: white; padding: 10px; border-radius: 16px; display: flex; gap: 10px; border: 2px solid #f1f5f9; box-shadow: 0 4px 20px rgba(0,0,0,0.03); }
        .url-input { flex: 1; border: none; padding: 10px 20px; outline: none; font-size: 0.9rem; font-weight: 500; font-family: inherit; }
        .btn-magic { background: var(--accent); color: white; border: none; padding: 10px 24px; border-radius: 10px; font-weight: 750; cursor: pointer; display: flex; align-items: center; gap: 8px; transition: 0.2s; }
        .btn-magic:hover { transform: scale(1.02); }
        .btn-magic:disabled { opacity: 0.5; }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .card { background: white; border-radius: 20px; padding: 20px; border: 2px solid #f1f5f9; transition: 0.3s; display: flex; flex-direction: column; gap: 12px; }
        .card:hover { border-color: var(--accent); box-shadow: 0 10px 30px -10px rgba(99,102,241,0.1); }
        .card-tag { font-size: 0.65rem; font-weight: 800; background: #f1f5f9; color: #64748b; padding: 3px 8px; border-radius: 5px; width: fit-content; text-transform: uppercase; }
        .card-title { font-family: 'Outfit', sans-serif; font-weight: 750; font-size: 1.05rem; color: #1e293b; line-height: 1.3; }
        .card-desc { font-size: 0.82rem; color: #64748b; line-height: 1.5; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
        .card-foot { margin-top: auto; padding-top: 15px; display: flex; align-items: center; justify-content: space-between; border-top: 1px solid #f1f5f9; }
        .card-link { font-size: 0.85rem; font-weight: 700; color: var(--accent); text-decoration: none; }
        .btn-trash { color: #cbd5e1; border: none; background: none; cursor: pointer; transition: 0.2s; }
        .btn-trash:hover { color: #ef4444; }

        .modal { position: fixed; inset: 0; background: rgba(15,23,42,0.6); backdrop-filter: blur(4px); z-index: 1000; display: none; align-items: center; justify-content: center; }
        .modal.active { display: flex; }
        .modal-box { background: white; border-radius: 24px; padding: 30px; width: 400px; max-width: 90%; }
        .modal-input { width: 100%; padding: 12px; border: 2px solid #f1f5f9; border-radius: 12px; margin: 10px 0 20px 0; outline: none; font-family: inherit; }
        .modal-input:focus { border-color: var(--accent); }

        .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: #1e293b; color: white; padding: 12px 25px; border-radius: 40px; font-size: 0.85rem; opacity: 0; transition: 0.3s; z-index: 2000; }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(-10px); }
    </style>
</head>
<body>

    <header class="header">
        <div class="header-left">
            <a href="index.html" style="color:var(--accent); margin-right:10px"><i class="fas fa-chevron-left"></i></a>
            <div class="logo-box"><i class="fas fa-sparkles"></i></div>
            <div class="app-info">
                <h1>Favoris IA</h1>
                <div class="sync-label">
                    <div class="dot" id="dot"></div>
                    <span id="label">Synchronisation...</span>
                </div>
            </div>
        </div>
        <div style="display:flex; gap:10px">
            <button class="folder-btn" style="width:40px; justify-content:center" onclick="openAI()" title="IA"><i class="fas fa-robot"></i></button>
            <button class="btn-magic" onclick="openFolder()"><i class="fas fa-folder-plus"></i> Dossier</button>
        </div>
    </header>

    <div class="main-view">
        <aside class="sidebar" id="sidebar">
            <p style="font-size:0.65rem; font-weight:800; color:#cbd5e1; text-transform:uppercase; margin-bottom:15px; letter-spacing:1px">Ma Collection</p>
            <button class="folder-btn active" onclick="filter('all')"><i class="fas fa-layer-group"></i> Tout voir</button>
            <button class="folder-btn" onclick="filter('none')"><i class="fas fa-inbox"></i> Non classés</button>
            <div id="folders-custom" style="margin-top:15px"></div>
        </aside>

        <main class="content">
            <form class="add-area" onsubmit="handleAdd(event)">
                <input type="url" id="url" class="url-input" placeholder="Collez l'URL à analyser ici..." required>
                <button type="submit" class="btn-magic" id="btn-add"><i class="fas fa-wand-sparkles"></i> Analyser</button>
            </form>
            <div class="grid" id="grid"></div>
        </main>
    </div>

    <!-- Modale IA -->
    <div class="modal" id="modal-ia">
        <div class="modal-box">
            <h2 style="font-family:'Outfit',sans-serif; margin-bottom:20px">Paramètres IA</h2>
            <label style="font-size:0.75rem; font-weight:700; color:#94a3b8">ALBERT AI (Bearer Key)</label>
            <input type="password" id="key-a" class="modal-input" placeholder="Clé Albert gouv.fr...">
            <label style="font-size:0.75rem; font-weight:700; color:#94a3b8">GOOGLE GEMINI (API Key)</label>
            <input type="password" id="key-g" class="modal-input" placeholder="Clé Gemini Flash...">
            <button class="btn-magic" style="width:100%; justify-content:center" onclick="saveK()">Sauvegarder</button>
            <button style="width:100%; border:none; background:none; padding:15px; color:#cbd5e1; cursor:pointer" onclick="closeM()">Fermer</button>
        </div>
    </div>

    <!-- Modale Dossier -->
    <div class="modal" id="modal-f">
        <div class="modal-box">
            <h2 style="font-family:'Outfit',sans-serif; margin-bottom:20px">Nouveau Dossier</h2>
            <input type="text" id="fn" class="modal-input" placeholder="Nom du dossier...">
            <button class="btn-magic" style="width:100%; justify-content:center" onclick="saveF()">Créer</button>
            <button style="width:100%; border:none; background:none; padding:15px; color:#cbd5e1; cursor:pointer" onclick="closeM()">Annuler</button>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        // CONFIG DE LA VEILLE (MAVEILLECG) - LA PLUS FIABLE
        const fbConfig = {
            apiKey: "AIzaSyAMyCPEipO3lr2o2OU4wVRETe708UArsOI",
            authDomain: "maveillecg.firebaseapp.com",
            projectId: "maveillecg",
            storageBucket: "maveillecg.firebasestorage.app",
            messagingSenderId: "823281436949",
            appId: "1:823281436949:web:df46ec3073c7772818411c"
        };
        const GillesUID = "f2659e26b5b7efa7d8099b64d60a7f68c7797c735cc2f2807923129f397a21a1";

        let db, favRef, foldersRef, activeF = 'all';
        let favs = [], flds = [];

        function setStatus(c, l) {
            document.getElementById('dot').className = 'dot ' + c;
            document.getElementById('label').innerText = l;
        }

        function toast(m) {
            const t = document.getElementById('toast');
            t.innerText = m; t.className = 'toast show';
            setTimeout(() => t.className = 'toast', 3000);
        }

        function openAI() {
            document.getElementById('modal-ia').classList.add('active');
            document.getElementById('key-a').value = localStorage.getItem('alk') || '';
            document.getElementById('key-g').value = localStorage.getItem('gek') || '';
        }
        function openFolder() { document.getElementById('modal-f').classList.add('active'); }
        function closeM() { document.querySelectorAll('.modal').forEach(m => m.classList.remove('active')); }
        
        function saveK() {
            localStorage.setItem('alk', document.getElementById('key-a').value.trim());
            localStorage.setItem('gek', document.getElementById('key-g').value.trim());
            closeM(); toast("Paramètres IA sauvés !");
        }

        async function saveF() {
            const n = document.getElementById('fn').value.trim();
            if(!n) return;
            await foldersRef.add({ name: n, createdAt: firebase.firestore.FieldValue.serverTimestamp() });
            document.getElementById('fn').value=''; closeM(); toast("Dossier créé !");
        }

        function filter(id) {
            activeF = id;
            document.querySelectorAll('.folder-btn').forEach(b => b.classList.toggle('active', b.onclick.toString().includes(`'${id}'`)));
            render();
        }

        async function init() {
            try {
                firebase.initializeApp(fbConfig);
                const auth = firebase.auth();
                db = firebase.firestore();

                // On force la connexion anonyme comme dans Veille Pro
                await auth.signInAnonymously();

                favRef = db.collection('artifacts').doc('favoris-ia').collection('users').doc(GillesUID).collection('bookmarks');
                foldersRef = db.collection('artifacts').doc('favoris-ia').collection('users').doc(GillesUID).collection('folders');

                favRef.orderBy('createdAt', 'desc').onSnapshot(s => {
                    favs = s.docs.map(d => ({id:d.id, ...d.data()}));
                    render();
                    setStatus('online', 'Gilles Connecté');
                }, e => {
                    console.error(e);
                    setStatus('error', 'Erreur de Droits');
                });

                foldersRef.orderBy('name').onSnapshot(s => {
                    flds = s.docs.map(d => ({id:d.id, ...d.data()}));
                    renderF();
                });

            } catch(e) {
                console.error(e);
                setStatus('error', 'Erreur Init');
            }
        }

        function renderF() {
            const container = document.getElementById('folders-custom');
            container.innerHTML = flds.map(f => `
                <button class="folder-btn ${activeF === f.id ? 'active' : ''}" onclick="filter('${f.id}')">
                    <i class="fas fa-folder"></i> ${f.name}
                </button>
            `).join('');
        }

        function render() {
            const g = document.getElementById('grid');
            let f = favs;
            if(activeF === 'none') f = favs.filter(b => !b.fid);
            else if(activeF !== 'all') f = favs.filter(b => b.fid === activeF);

            if(f.length === 0) { g.innerHTML = '<div style="grid-column:1/-1; text-align:center; padding:80px; color:#cbd5e1">Aucun favori trouvé.</div>'; return; }

            g.innerHTML = f.map(b => `
                <div class="card">
                    <div class="card-tag">${b.tag || 'Lien'}</div>
                    <div class="card-title">${b.title || 'Sans titre'}</div>
                    <div class="card-desc">${b.desc || ''}</div>
                    <div class="card-foot">
                        <a href="${b.url}" target="_blank" class="card-link">Consulter <i class="fas fa-external-link"></i></a>
                        <button class="btn-trash" onclick="delLink('${b.id}')"><i class="fas fa-trash-can"></i></button>
                    </div>
                </div>
            `).join('');
        }

        async function delLink(id) {
            if(confirm("Supprimer ce favori ?")) { await favRef.doc(id).delete(); toast("Supprimé"); }
        }

        async function handleAdd(e) {
            e.preventDefault();
            const u = document.getElementById('url');
            const b = document.getElementById('btn-add');
            let url = u.value.trim();
            if(!url) return;

            b.disabled = true; b.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Analyse...';

            try {
                const prompt = `Analyse ce site: ${url}. Réponds en JSON: {"title":"","desc":"","tag":""}`;
                let res = { title: url, desc: "", tag: "Autre" };
                const alk = localStorage.getItem('alk');
                const gek = localStorage.getItem('gek');

                if(alk || gek) {
                    try {
                        if(alk) {
                            const resp = await fetch("https://albert.api.gouv.fr/v1/chat/completions", {
                                method: "POST", headers: { "Content-Type":"application/json", "Authorization":`Bearer ${alk}` },
                                body: JSON.stringify({ model:"openai/gpt-oss-120b", messages:[{role:"user", content:prompt}] })
                            });
                            const j = await resp.json();
                            res = JSON.parse(j.choices[0].message.content.replace(/```json|```/g,'').trim());
                        } else {
                            const resp = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${gek}`, {
                                method: "POST", headers: { "Content-Type":"application/json" },
                                body: JSON.stringify({ contents:[{parts:[{text:prompt}]}] })
                            });
                            const j = await resp.json();
                            res = JSON.parse(j.candidates[0].content.parts[0].text.replace(/```json|```/g,'').trim());
                        }
                    } catch(e) { console.warn(e); }
                }

                await favRef.add({ ...res, url, fid: activeF === 'all' ? null : activeF, createdAt: firebase.firestore.FieldValue.serverTimestamp() });
                u.value = ''; toast("Ajouté avec succès !");
            } catch(e) { toast("Erreur de sauvegarde"); }
            finally { b.disabled = false; b.innerHTML = '<i class="fas fa-wand-sparkles"></i> Analyser'; }
        }

        window.onload = init;
    </script>
</body>
</html>
