<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Favoris | Portail</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;800&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
    <style>
        :root { --bg: #f8fafc; --accent: #6366f1; --red: #ef4444; --green: #22c55e; --text: #1e293b; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        .app-header { background: white; border-bottom: 1px solid #e2e8f0; padding: 12px 20px; display: flex; align-items: center; justify-content: space-between; gap: 15px; }
        .sync-label { font-size: 0.75rem; display: flex; align-items: center; gap: 6px; font-weight: 600; }
        .sync-dot { width: 8px; height: 8px; border-radius: 50%; background: #f59e0b; }
        .sync-dot.green { background: var(--green); }
        .sync-dot.red { background: var(--red); }
        .sync-dot.pulse { animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0.3; } }
        .main { flex: 1; overflow-y: auto; padding: 20px; max-width: 1000px; margin: 0 auto; width: 100%; }
        .add-box { background: white; border-radius: 12px; padding: 8px; display: flex; border: 1px solid #e2e8f0; margin-bottom: 25px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
        .add-input { flex: 1; border: none; padding: 12px 15px; outline: none; font-size: 0.95rem; }
        .btn-add { background: var(--accent); color: white; border: none; padding: 10px 20px; border-radius: 8px; font-weight: 700; cursor: pointer; display: flex; align-items: center; gap: 8px; }
        .btn-ai { background: white; border: 1px solid #e2e8f0; padding: 8px 12px; border-radius: 8px; cursor: pointer; font-size: 0.85rem; display: flex; align-items: center; gap: 6px; }
        .dot-ai { width: 6px; height: 6px; border-radius: 50%; background: var(--red); border: 1px solid white; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .card { background: white; border-radius: 12px; padding: 16px; border: 1px solid #e2e8f0; box-shadow: 0 1px 3px 0 rgb(0 0 0 / 0.1); position: relative; }
        .card-tag { font-size: 0.65rem; background: #eef2ff; color: var(--accent); padding: 2px 8px; border-radius: 4px; font-weight: 700; position: absolute; top: 16px; right: 16px; }
        .card-title { font-family: 'Outfit', sans-serif; font-weight: 700; margin-bottom: 8px; font-size: 1rem; color: var(--text); padding-right: 60px; }
        .card-desc { font-size: 0.8rem; color: #64748b; line-height: 1.4; height: 3.2em; overflow: hidden; margin-bottom: 12px; }
        .card-foot { display: flex; justify-content: space-between; border-top: 1px solid #f1f5f9; padding-top: 10px; }
        .card-link { font-size: 0.8rem; color: var(--accent); font-weight: 600; text-decoration: none; }
        .btn-del { border: none; background: none; color: #94a3b8; cursor: pointer; }
        .btn-del:hover { color: var(--red); }
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 1000; display: none; align-items: center; justify-content: center; backdrop-filter: blur(2px); }
        .modal.active { display: flex; }
        .modal-box { background: white; padding: 25px; border-radius: 16px; width: 350px; }
        .m-input { width: 100%; padding: 10px; border: 1px solid #e2e8f0; border-radius: 8px; margin: 10px 0; outline: none; }
        .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #1e293b; color: white; padding: 10px 20px; border-radius: 30px; font-size: 0.8rem; opacity: 0; transition: 0.3s; pointer-events: none; }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(-10px); }
    </style>
</head>
<body>
    <div id="debug-overlay" style="display:none; position:fixed; inset:0; background:white; z-index:9999; padding:20px; color:red; font-family:monospace; overflow:auto"></div>
    <script>
        window.onerror = function(m, s, l) {
            const overlay = document.getElementById('debug-overlay');
            overlay.style.display = 'block';
            overlay.innerHTML += `<div>ERROR: ${m} at ${s}:${l}</div>`;
        };
    </script>

    <header class="app-header">
        <div style="display:flex; align-items:center; gap:12px">
            <a href="index.html" style="color:var(--accent)"><i class="fas fa-arrow-left"></i></a>
            <h1 style="font-family:'Outfit',sans-serif; font-size:1.1rem; margin:0">Favoris</h1>
            <div class="sync-label">
                <span class="sync-dot pulse" id="sync-dot"></span>
                <span id="sync-label">Démarrage...</span>
            </div>
        </div>
        <button class="btn-ai" onclick="openAIModal()">
            <i class="fas fa-robot"></i> IA <div class="dot-ai" id="ai-dot"></div>
        </button>
    </header>

    <main class="main">
        <form class="add-box" onsubmit="addLink(event)">
            <input type="url" id="url-in" class="add-input" placeholder="Collez un lien ici..." required>
            <button class="btn-add" id="btn-add"><i class="fas fa-magic"></i> Analyser</button>
        </form>
        <div class="grid" id="grid"></div>
    </main>

    <div class="modal" id="modal-ai">
        <div class="modal-box">
            <h3 style="margin-top:0">Paramètres IA</h3>
            <label style="font-size:0.8rem">Clé API Albert (Gouv.fr)</label>
            <input type="password" id="albert-key" class="m-input" placeholder="Saisir la clé...">
            <label style="font-size:0.8rem">Clé API Gemini</label>
            <input type="password" id="gemini-key" class="m-input" placeholder="Saisir la clé...">
            <button onclick="saveAI()" style="width:100%; padding:10px; border:none; background:var(--accent); color:white; border-radius:8px; font-weight:700; cursor:pointer">Enregistrer</button>
            <button onclick="closeModal()" style="width:100%; margin-top:10px; border:none; background:none; color:#64748b; cursor:pointer">Fermer</button>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script>
        const config = {
            apiKey: "AIzaSyBGxXTvy8thfYJZTP-QbWrV-2euTmj4NPY",
            authDomain: "portail-postits.firebaseapp.com",
            projectId: "portail-postits",
            storageBucket: "portail-postits.firebasestorage.app",
            messagingSenderId: "494625342197",
            appId: "1:494625342197:web:9cc573fda25019e57ebbbc"
        };
        const sessionUid = "f2659e26b5b7efa7d8099b64d60a7f68c7797c735cc2f2807923129f397a21a1";
        let bookmarks = [];
        let bookmarksRef;

        function setStatus(s, m) {
            const d = document.getElementById('sync-dot');
            const l = document.getElementById('sync-label');
            l.innerText = m;
            d.className = 'sync-dot ' + s;
        }

        function showToast(m) {
            const t = document.getElementById('toast');
            t.innerText = m; t.className = 'toast show';
            setTimeout(() => t.className = 'toast', 3000);
        }

        window.openAIModal = () => {
            document.getElementById('modal-ai').classList.add('active');
            document.getElementById('albert-key').value = localStorage.getItem('albertApiKey') || '';
            document.getElementById('gemini-key').value = localStorage.getItem('geminiApiKey') || '';
        };

        window.closeModal = () => document.getElementById('modal-ai').classList.remove('active');

        window.saveAI = () => {
            localStorage.setItem('albertApiKey', document.getElementById('albert-key').value.trim());
            localStorage.setItem('geminiApiKey', document.getElementById('gemini-key').value.trim());
            updateAIDot(); closeModal(); showToast("IA Configurét !");
        };

        function updateAIDot() {
            const k = localStorage.getItem('albertApiKey') || localStorage.getItem('geminiApiKey');
            document.getElementById('ai-dot').style.background = k ? '#22c55e' : '#ef4444';
        }

        async function init() {
            try {
                if(!window.firebase) throw new Error("Fichiers Firebase non chargés.");
                firebase.initializeApp(config);
                const db = firebase.firestore();
                bookmarksRef = db.collection('artifacts').doc('favoris-app').collection('users').doc(sessionUid).collection('bookmarks');
                
                setStatus('pulse', 'Chargement...');
                
                bookmarksRef.orderBy('createdAt', 'desc').limit(50).onSnapshot(s => {
                    bookmarks = s.docs.map(d => ({id: d.id, ...d.data()}));
                    render();
                    setStatus('green', 'Session Gilles');
                }, e => {
                    console.error(e);
                    setStatus('red', 'Problème Droits');
                    showToast("Erreur lecture: Verifiez la base.");
                });

                updateAIDot();
            } catch(e) {
                setStatus('red', 'Erreur Init');
                document.getElementById('debug-overlay').style.display = 'block';
                document.getElementById('debug-overlay').innerText = e.message;
            }
        }

        function render() {
            const g = document.getElementById('grid');
            if(bookmarks.length === 0) {
                g.innerHTML = '<div style="grid-column:1/-1;text-align:center;color:#64748b;padding:40px">Aucun favoris</div>';
                return;
            }
            g.innerHTML = bookmarks.map(b => `
                <div class="card">
                    <span class="card-tag">${b.tag || 'Lien'}</span>
                    <h3 class="card-title">${(b.title || 'Sans titre').substring(0,50)}</h3>
                    <p class="card-desc">${(b.summary || 'Aucune description').substring(0,100)}</p>
                    <div class="card-foot">
                        <a href="${b.url}" target="_blank" class="card-link">Consulter <i class="fas fa-external-link-alt"></i></a>
                        <button class="btn-del" onclick="delLink('${b.id}')"><i class="fas fa-trash"></i></button>
                    </div>
                </div>
            `).join('');
        }

        window.delLink = async (id) => {
            if(confirm("Supprimer ?")) {
                await bookmarksRef.doc(id).delete(); showToast("Supprimé");
            }
        };

        window.addLink = async (e) => {
            e.preventDefault();
            const inp = document.getElementById('url-in');
            const btn = document.getElementById('btn-add');
            let url = inp.value.trim();
            if(!url || !bookmarksRef) return;
            
            btn.disabled = true; btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';
            
            try {
                const ai = await analyze(url);
                await bookmarksRef.add({
                    url, title: ai.title || url, summary: ai.desc || "",
                    tag: ai.tag || "Autre", createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });
                inp.value = ''; showToast("Ajouté !");
            } catch(err) {
                showToast("Erreur: " + err.message);
            } finally {
                btn.disabled = false; btn.innerHTML = '<i class="fas fa-magic"></i> Analyser';
            }
        };

        async function analyze(url) {
            const alk = localStorage.getItem('albertApiKey');
            const gek = localStorage.getItem('geminiApiKey');
            if(!alk && !gek) return { title: url };
            
            try {
                const prompt = `Analyse ${url}. Retourne JSON: {"title":"...","desc":"...","tag":"..."}`;
                let res, data;
                if(alk) {
                    res = await fetch("https://albert.api.gouv.fr/v1/chat/completions", {
                        method: "POST", headers: { "Content-Type":"application/json", "Authorization":`Bearer ${alk}` },
                        body: JSON.stringify({ model:"openai/gpt-oss-120b", messages:[{role:"user", content:prompt}] })
                    });
                    const j = await res.json();
                    data = JSON.parse(j.choices[0].message.content.replace(/```json|```/g,'').trim());
                } else {
                    res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${gek}`, {
                        method: "POST", headers: { "Content-Type":"application/json" },
                        body: JSON.stringify({ contents:[{parts:[{text:prompt}]}] })
                    });
                    const j = await res.json();
                    data = JSON.parse(j.candidates[0].content.parts[0].text.replace(/```json|```/g,'').trim());
                }
                return data;
            } catch(e) { return { title: url }; }
        }

        setTimeout(init, 500); // Laisse le temps aux scripts de charger
    </script>
</body>
</html>
