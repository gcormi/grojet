<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Studio Ultimate - Correctif Modales & Vidéo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/open-dyslexic@1.0.3/dist/external/open-dyslexic.css">
    
    <style>
        :root {
            --editor-bg: #ffffff;
            --editor-text: #0f172a;
            --toolbar-bg: #ffffff;
            --border-color: #e2e8f0;
            --select-bg: #f1f5f9;
            --select-text: #334155;
            --btn-height: 38px;
        }

        .dark-mode {
            --editor-bg: #0f172a;
            --editor-text: #f1f5f9;
            --toolbar-bg: #1e293b;
            --border-color: #334155;
            --select-bg: #334155;
            --select-text: #f8fafc;
        }

        body { background-color: var(--editor-bg); color: var(--editor-text); transition: all 0.3s ease; }

        #visualEditor {
            outline: none;
            min-height: 100%;
            line-height: 1.6;
            background-color: var(--editor-bg);
            color: var(--editor-text);
            padding: 40px;
        }

        #visualEditor img, #visualEditor iframe {
            max-width: 100%;
            border: 3px solid transparent;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: block;
            margin: 15px 0;
        }

        #visualEditor iframe {
            background: #000;
            min-height: 250px;
            pointer-events: none;
        }

        .selected-element {
            border-color: #6366f1 !important;
            box-shadow: 0 0 20px rgba(99, 102, 241, 0.4);
        }

        #panelDivider {
            width: 4px;
            cursor: col-resize;
            background-color: var(--border-color);
            z-index: 10;
        }
        #panelDivider:hover, #panelDivider.active { background-color: #6366f1; width: 6px; }

        .toolbar-group {
            @apply flex items-center gap-1 px-3 border-r border-slate-200 dark:border-slate-800 last:border-0;
            height: var(--btn-height);
        }

        .toolbar-btn {
            @apply hover:bg-slate-100 dark:hover:bg-slate-800 rounded-xl transition-all flex items-center justify-center text-slate-500 dark:text-slate-400 hover:text-indigo-600;
            width: var(--btn-height);
            height: var(--btn-height);
        }

        .custom-select {
            background-color: var(--select-bg);
            color: var(--select-text);
            @apply border border-slate-200 dark:border-slate-700 rounded-xl px-3 text-xs font-bold focus:ring-2 focus:ring-indigo-500 outline-none cursor-pointer;
            height: var(--btn-height);
        }

        .color-wrapper {
            @apply relative flex items-center justify-center rounded-xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 hover:border-indigo-400 overflow-hidden;
            width: var(--btn-height); height: var(--btn-height);
        }

        #textColorPicker { @apply absolute inset-0 w-full h-full p-0 border-none cursor-pointer scale-[5] opacity-0; }
        #colorBar { @apply absolute bottom-1 w-5 h-1 rounded-full; background-color: #000; }

        #resizer {
            position: absolute; width: 14px; height: 14px;
            background: #6366f1; border: 2px solid white;
            z-index: 100; cursor: nwse-resize;
            display: none; border-radius: 50%;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        /* SYSTÈME DE MODALES ROBUSTE */
        #modalMasterContainer {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(4px);
            z-index: 10000; /* Priorité maximale */
            align-items: center;
            justify-content: center;
        }

        .modal-box {
            display: none;
            @apply bg-white dark:bg-slate-900 p-8 rounded-[2.5rem] shadow-2xl border border-slate-200 dark:border-slate-800;
            width: 90%;
            max-width: 500px;
            max-height: 90vh;
            overflow-y: auto;
        }

        #markdownArea {
            @apply w-full h-[50vh] p-6 mt-4 font-mono text-sm bg-slate-50 dark:bg-slate-950 border border-slate-200 dark:border-slate-800 rounded-2xl overflow-auto text-slate-800 dark:text-slate-200 leading-relaxed;
            white-space: pre-wrap;
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden font-sans">

    <!-- En-tête -->
    <header class="bg-white dark:bg-slate-900 border-b border-slate-200 dark:border-slate-800 z-20">
        <div class="flex items-center justify-between px-6 py-4">
            <div class="flex items-center gap-4">
                <div class="bg-indigo-600 p-2.5 rounded-2xl text-white shadow-lg">
                    <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="16 18 22 12 16 6"></polyline><polyline points="8 6 2 12 8 18"></polyline></svg>
                </div>
                <div>
                    <h1 class="font-black text-slate-900 dark:text-white leading-none text-xl uppercase tracking-tighter">HTML Studio</h1>
                    <p class="text-[10px] text-indigo-500 font-bold uppercase tracking-widest mt-1">Multimedia Edition Pro</p>
                </div>
            </div>

            <div class="flex items-center gap-3">
                <button onclick="toggleDarkMode()" class="p-3 bg-slate-100 dark:bg-slate-800 rounded-2xl hover:bg-indigo-50 dark:hover:bg-indigo-900/30 text-slate-500 dark:text-slate-400 transition-all">
                    <svg id="themeIcon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
                </button>
                <div class="h-10 w-px bg-slate-200 dark:bg-slate-800 mx-2"></div>
                <div class="flex items-center gap-2">
                    <button onclick="exportMarkdown()" class="text-[10px] font-black px-4 py-2.5 text-indigo-600 dark:text-indigo-400 bg-indigo-50 dark:bg-indigo-900/30 rounded-2xl hover:bg-indigo-100 transition-all uppercase tracking-widest border border-indigo-100 dark:border-indigo-800">MD</button>
                    <button onclick="exportHTML()" class="text-[10px] font-black px-4 py-2.5 text-slate-500 dark:text-slate-300 bg-slate-100 dark:bg-slate-800 rounded-2xl hover:bg-white transition-all uppercase tracking-widest border border-transparent hover:border-slate-200">HTML</button>
                    <button onclick="exportZIP()" class="text-[10px] font-black px-6 py-2.5 bg-indigo-600 text-white rounded-2xl hover:bg-indigo-700 shadow-xl transition-all uppercase tracking-widest">ZIP</button>
                </div>
            </div>
        </div>

        <div class="bg-slate-50 dark:bg-slate-950 border-t border-slate-200 dark:border-slate-800 px-3 py-2.5 flex items-center overflow-x-auto no-scrollbar">
            <div class="toolbar-group">
                <button onclick="execCmd('undo')" class="toolbar-btn"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M3 7v6h6"></path><path d="M21 17a9 9 0 0 0-9-9 9 9 0 0 0-6 2.3L3 13"></path></svg></button>
                <button onclick="execCmd('redo')" class="toolbar-btn"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M21 7v6h-6"></path><path d="M3 17a9 9 0 0 1 9-9 9 9 0 0 1 6 2.3L21 13"></path></svg></button>
            </div>

            <div class="toolbar-group gap-2">
                <select id="fontSelect" onchange="execCmd('fontName', this.value)" class="custom-select w-40">
                    <option value="Arial">Arial</option>
                    <option value="'OpenDyslexic'">Dyslexic (Dys)</option>
                    <option value="'Comic Sans MS'">Comic Sans</option>
                    <option value="Georgia">Serif</option>
                    <option value="'Courier New'">Monospace</option>
                </select>
                <select onchange="execCmd('fontSize', this.value)" class="custom-select w-24">
                    <option value="3">Normal</option>
                    <option value="1">Petit</option>
                    <option value="5">Gros</option>
                    <option value="7">Géant</option>
                </select>
            </div>

            <div class="toolbar-group">
                <button onclick="execCmd('bold')" class="toolbar-btn font-black">B</button>
                <button onclick="execCmd('italic')" class="toolbar-btn italic font-serif">I</button>
                <button onclick="execCmd('underline')" class="toolbar-btn underline">U</button>
                <div class="color-wrapper ml-1">
                    <span class="text-[11px] font-black">A</span>
                    <div id="colorBar"></div>
                    <input type="color" id="textColorPicker" oninput="changeColor(this.value)">
                </div>
            </div>

            <div class="toolbar-group">
                <button onclick="execCmd('justifyLeft')" class="toolbar-btn"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><line x1="17" y1="10" x2="3" y2="10"></line><line x1="21" y1="6" x2="3" y2="6"></line><line x1="21" y1="14" x2="3" y2="14"></line><line x1="17" y1="18" x2="3" y2="18"></line></svg></button>
                <button onclick="execCmd('justifyCenter')" class="toolbar-btn"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><line x1="18" y1="10" x2="6" y2="10"></line><line x1="21" y1="6" x2="3" y2="6"></line><line x1="21" y1="14" x2="3" y2="14"></line><line x1="18" y1="18" x2="6" y2="18"></line></svg></button>
                <button onclick="execCmd('justifyRight')" class="toolbar-btn"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><line x1="21" y1="10" x2="7" y2="10"></line><line x1="21" y1="6" x2="3" y2="6"></line><line x1="21" y1="14" x2="3" y2="14"></line><line x1="21" y1="18" x2="7" y2="18"></line></svg></button>
            </div>

            <div class="toolbar-group">
                <button onclick="openLinkModal()" class="toolbar-btn" title="Lien"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"></path><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"></path></svg></button>
                <button onclick="insertTable()" class="toolbar-btn" title="Tableau"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="3" y1="9" x2="21" y2="9"></line><line x1="3" y1="15" x2="21" y2="15"></line><line x1="9" y1="3" x2="9" y2="21"></line><line x1="15" y1="3" x2="15" y2="21"></line></svg></button>
                <input type="file" id="imageInput" accept="image/*" class="hidden" multiple onchange="handleImageUpload(this)">
                <button onclick="document.getElementById('imageInput').click()" class="toolbar-btn"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg></button>
                
                <button onclick="openVideoModal()" class="toolbar-btn text-red-500 bg-red-50 dark:bg-red-900/20"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><rect width="18" height="14" x="3" y="5" rx="2" ry="2"></rect><path d="m9 9 5 3-5 3V9z"></path></svg></button>
                
                <button onclick="openMarkdownPreview()" class="toolbar-btn text-indigo-600 bg-indigo-50 dark:bg-indigo-900/30 font-black text-xs">M↓</button>
            </div>

            <button onclick="formatCode()" class="ml-auto text-[10px] font-black bg-slate-200 dark:bg-slate-800 px-4 py-2 rounded-xl hover:bg-indigo-600 hover:text-white transition-all uppercase tracking-widest mr-4">Clean</button>
        </div>
    </header>

    <main class="flex-1 flex overflow-hidden relative">
        <div id="leftPanel" class="flex flex-col border-r border-slate-200 dark:border-slate-800 bg-slate-900" style="width: 40%;">
            <div class="bg-slate-800/90 px-5 py-3 text-[10px] font-black text-slate-400 uppercase flex justify-between items-center tracking-widest">
                <span>Code Source HTML</span>
                <span id="codeSize" class="bg-indigo-900/50 text-indigo-300 px-3 py-1 rounded-lg font-mono">0 B</span>
            </div>
            <textarea id="htmlCode" class="flex-1 p-6 font-mono text-xs bg-slate-900 text-indigo-300 focus:outline-none resize-none leading-relaxed overflow-y-auto no-scrollbar" spellcheck="false"></textarea>
        </div>

        <div id="panelDivider"></div>

        <div id="rightPanel" class="flex-1 flex flex-col bg-white dark:bg-slate-950 relative">
            <div class="bg-slate-50 dark:bg-slate-900 px-5 py-3 text-[10px] font-black text-slate-400 uppercase border-b border-slate-200 dark:border-slate-800 tracking-widest">Zone de rédaction</div>
            <div class="flex-1 overflow-y-auto scroll-smooth">
                <div id="visualEditor" contenteditable="true"></div>
            </div>
            <div id="resizer"></div>
        </div>
    </main>

    <footer class="bg-white dark:bg-slate-900 border-t border-slate-200 dark:border-slate-800 px-6 py-3 text-slate-400 dark:text-slate-500 text-[10px] flex justify-between items-center z-20">
        <div class="flex items-center gap-8">
            <span id="wordCount" class="font-bold uppercase tracking-tighter">0 mots</span>
            <span id="statusMsg" class="text-green-600 dark:text-green-500 font-black uppercase tracking-widest">Opérationnel ✓</span>
        </div>
        <div class="flex items-center gap-4">
            <span id="pathIndicator" class="font-mono bg-slate-100 dark:bg-slate-800 px-3 py-1 rounded-lg text-indigo-500 font-bold uppercase tracking-tighter">body</span>
        </div>
    </footer>

    <!-- MASTER CONTAINER POUR TOUTES LES MODALES -->
    <div id="modalMasterContainer" onclick="closeIfOverlay(event)">
        
        <!-- Fenêtre Vidéo -->
        <div id="videoModal" class="modal-box">
            <h3 class="text-2xl font-black mb-6 uppercase tracking-tighter dark:text-white">Vidéo YouTube</h3>
            <input type="text" id="videoInput" placeholder="URL YouTube..." class="w-full bg-slate-100 dark:bg-slate-800 border-none rounded-2xl p-5 outline-none focus:ring-4 focus:ring-red-500/20 dark:text-white font-bold mb-6">
            <div class="flex justify-end gap-3">
                <button onclick="closeAllModals()" class="px-6 py-3 text-slate-500 font-bold uppercase">Annuler</button>
                <button onclick="applyVideo()" class="px-8 py-3 bg-red-600 text-white rounded-2xl font-bold uppercase shadow-lg shadow-red-200">Insérer</button>
            </div>
        </div>

        <!-- Fenêtre Markdown -->
        <div id="markdownModal" class="modal-box !max-w-4xl">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-2xl font-black uppercase tracking-tighter dark:text-white">Markdown</h3>
                <div class="flex gap-2">
                    <button onclick="copyMarkdown()" id="btnCopyMd" class="bg-indigo-600 text-white px-6 py-2.5 rounded-2xl font-black uppercase tracking-widest">Copier</button>
                    <button onclick="closeAllModals()" class="text-slate-400 p-2 font-bold uppercase">X</button>
                </div>
            </div>
            <div id="markdownArea"></div>
        </div>

        <!-- Fenêtre Lien -->
        <div id="linkModal" class="modal-box !max-w-md">
            <h3 class="text-xl font-black mb-6 uppercase tracking-tighter dark:text-white">Insérer un lien</h3>
            <input type="text" id="linkInput" placeholder="https://..." class="w-full bg-slate-100 dark:bg-slate-800 border-none rounded-2xl p-5 outline-none focus:ring-4 focus:ring-indigo-500/20 dark:text-white font-bold mb-6">
            <div class="flex justify-end gap-3">
                <button onclick="closeAllModals()" class="px-6 py-3 text-slate-500 font-bold uppercase text-xs">Fermer</button>
                <button onclick="applyLink()" class="px-8 py-3 bg-indigo-600 text-white rounded-xl font-bold uppercase text-xs">Valider</button>
            </div>
        </div>
    </div>

    <script>
        const htmlInput = document.getElementById('htmlCode');
        const visualEditor = document.getElementById('visualEditor');
        const codeSizeDisplay = document.getElementById('codeSize');
        const resizer = document.getElementById('resizer');
        const panelDivider = document.getElementById('panelDivider');
        const leftPanel = document.getElementById('leftPanel');
        const statusMsg = document.getElementById('statusMsg');

        let isUpdating = false;
        let selectedElement = null;
        const imageFiles = new Map();

        // --- Core Functions ---
        function showModal(id) {
            document.getElementById('modalMasterContainer').style.display = 'flex';
            document.querySelectorAll('.modal-box').forEach(m => m.style.display = 'none');
            const target = document.getElementById(id);
            target.style.display = 'block';
            const input = target.querySelector('input');
            if (input) input.focus();
        }

        function closeAllModals() {
            document.getElementById('modalMasterContainer').style.display = 'none';
        }

        function closeIfOverlay(e) {
            if (e.target.id === 'modalMasterContainer') closeAllModals();
        }

        function syncToCode() {
            if (isUpdating) return;
            isUpdating = true;
            const tempDiv = document.createElement('div');
            tempDiv.innerHTML = visualEditor.innerHTML;
            tempDiv.querySelectorAll('img, iframe').forEach(el => {
                el.classList.remove('selected-element');
                const filename = el.getAttribute('data-filename');
                if (filename && el.tagName === 'IMG') el.src = filename;
            });
            htmlInput.value = formatHTML(tempDiv.innerHTML);
            updateStats();
            localStorage.setItem('html_studio_v2.9_final', visualEditor.innerHTML);
            isUpdating = false;
        }

        htmlInput.addEventListener('input', () => {
            if (isUpdating) return;
            isUpdating = true;
            visualEditor.innerHTML = htmlInput.value;
            updateStats();
            isUpdating = false;
        });

        visualEditor.addEventListener('input', syncToCode);

        // --- Multimedia ---
        function openVideoModal() { showModal('videoModal'); }

        function applyVideo() {
            const url = document.getElementById('videoInput').value.trim();
            const videoId = extractVideoId(url);
            if (videoId) {
                const embedUrl = `https://www.youtube.com/embed/${videoId}`;
                const iframeHTML = `<iframe width="560" height="315" src="${embedUrl}" frameborder="0" allowfullscreen></iframe><p><br></p>`;
                
                visualEditor.focus();
                const sel = window.getSelection();
                if (sel.rangeCount > 0) {
                    const range = sel.getRangeAt(0);
                    const div = document.createElement('div');
                    div.innerHTML = iframeHTML;
                    range.insertNode(div.firstChild);
                    range.collapse(false);
                } else {
                    visualEditor.innerHTML += iframeHTML;
                }
            }
            closeAllModals();
            document.getElementById('videoInput').value = "";
            syncToCode();
        }

        function extractVideoId(url) {
            const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
            const match = url.match(regExp);
            return (match && match[2].length === 11) ? match[2] : null;
        }

        // --- Markdown ---
        function openMarkdownPreview() {
            syncToCode();
            const markdown = convertHTMLtoMarkdown(visualEditor.innerHTML);
            const area = document.getElementById('markdownArea');
            area.textContent = markdown || "Aucun contenu.";
            showModal('markdownModal');
            document.getElementById('btnCopyMd').textContent = "Copier";
        }

        function convertHTMLtoMarkdown(html) {
            const div = document.createElement('div');
            div.innerHTML = html;

            function process(node) {
                if (node.nodeType === 3) return node.textContent;
                if (node.nodeType !== 1) return "";
                let children = Array.from(node.childNodes).map(process).join("");

                switch(node.tagName) {
                    case 'H1': return `\n# ${children}\n`;
                    case 'H2': return `\n## ${children}\n`;
                    case 'H3': return `\n### ${children}\n`;
                    case 'P': return children.trim() ? `\n${children}\n` : "";
                    case 'B': case 'STRONG': return `**${children}**`;
                    case 'I': case 'EM': return `*${children}*`;
                    case 'U': return `<u>${children}</u>`;
                    case 'BR': return "  \n";
                    case 'UL': return `\n${children}\n`;
                    case 'LI': return `- ${children}\n`;
                    case 'A': return `[${children}](${node.getAttribute('href')})`;
                    case 'IMG': return `![image](${node.getAttribute('data-filename') || node.getAttribute('src')})`;
                    case 'IFRAME': return `\n[📺 YouTube](${node.getAttribute('src')})\n`;
                    case 'TABLE':
                        let rows = Array.from(node.querySelectorAll('tr'));
                        if (rows.length === 0) return "";
                        let md = "\n";
                        rows.forEach((row, i) => {
                            let cells = Array.from(row.querySelectorAll('td, th')).map(c => c.textContent.trim().replace(/\|/g, "\\|"));
                            md += `| ${cells.join(" | ")} |\n`;
                            if (i === 0) md += `| ${cells.map(() => "---").join(" | ")} |\n`;
                        });
                        return md + "\n";
                    default: return children;
                }
            }
            return Array.from(div.childNodes).map(process).join("").replace(/\n{3,}/g, "\n\n").trim();
        }

        // --- Interaction ---
        visualEditor.addEventListener('click', (e) => {
            if (e.target.tagName === 'IMG' || e.target.tagName === 'IFRAME') {
                if (selectedElement) selectedElement.classList.remove('selected-element');
                selectedElement = e.target;
                selectedElement.classList.add('selected-element');
                updateResizerPosition();
                resizer.style.display = 'block';
            } else {
                if (selectedElement) selectedElement.classList.remove('selected-element');
                selectedElement = null;
                resizer.style.display = 'none';
            }
        });

        function updateResizerPosition() {
            if (!selectedElement) return;
            resizer.style.top = (selectedElement.offsetTop + selectedElement.offsetHeight - 7) + 'px';
            resizer.style.left = (selectedElement.offsetLeft + selectedElement.offsetWidth - 7) + 'px';
        }

        let isResizing = false;
        resizer.addEventListener('mousedown', (e) => {
            e.preventDefault(); e.stopPropagation();
            isResizing = true;
            document.addEventListener('mousemove', handleResizeMove);
            document.addEventListener('mouseup', () => {
                isResizing = false;
                document.removeEventListener('mousemove', handleResizeMove);
                syncToCode();
            });
        });

        function handleResizeMove(e) {
            if (!isResizing || !selectedElement) return;
            const rect = selectedElement.getBoundingClientRect();
            const newWidth = e.clientX - rect.left;
            if (newWidth > 100) {
                selectedElement.style.width = newWidth + 'px';
                if (selectedElement.tagName === 'IFRAME') selectedElement.style.height = (newWidth * 0.5625) + 'px';
                else selectedElement.style.height = 'auto';
                updateResizerPosition();
            }
        }

        // --- Splitter ---
        let isResizingPanels = false;
        panelDivider.addEventListener('mousedown', () => {
            isResizingPanels = true;
            panelDivider.classList.add('active');
            document.body.style.cursor = 'col-resize';
        });

        document.addEventListener('mousemove', (e) => {
            if (isResizingPanels) {
                let newWidth = e.clientX;
                const min = 150;
                const max = document.body.clientWidth - 150;
                if (newWidth < min) newWidth = min;
                if (newWidth > max) newWidth = max;
                leftPanel.style.width = newWidth + 'px';
                if (selectedElement) updateResizerPosition();
            }
        });

        document.addEventListener('mouseup', () => {
            isResizingPanels = false;
            panelDivider.classList.remove('active');
            document.body.style.cursor = 'default';
        });

        // --- Helpers ---
        function execCmd(cmd, val = null) {
            visualEditor.focus();
            document.execCommand(cmd, false, val);
            syncToCode();
        }

        function changeColor(val) {
            document.getElementById('colorBar').style.backgroundColor = val;
            execCmd('foreColor', val);
        }

        function openLinkModal() { showModal('linkModal'); }

        function applyLink() {
            const url = document.getElementById('linkInput').value;
            if (url) execCmd('createLink', url);
            closeAllModals();
        }

        function handleImageUpload(input) {
            Array.from(input.files).forEach(file => {
                if (file.type.match('image.*')) {
                    imageFiles.set(file.name, file);
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        const img = `<img src="${e.target.result}" data-filename="${file.name}" style="width:300px;">`;
                        execCmd('insertHTML', img);
                    };
                    reader.readAsDataURL(file);
                }
            });
            input.value = '';
        }

        function exportMarkdown() {
            syncToCode();
            const blob = new Blob([convertHTMLtoMarkdown(visualEditor.innerHTML)], { type: 'text/markdown' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'document.md';
            a.click();
        }

        function exportHTML() {
            const blob = new Blob([htmlInput.value], {type: "text/html"});
            const a = document.createElement("a");
            a.href = URL.createObjectURL(blob);
            a.download = 'index.html';
            a.click();
        }

        async function exportZIP() {
            syncToCode();
            const zip = new JSZip();
            zip.file("index.html", htmlInput.value);
            zip.file("readme.md", convertHTMLtoMarkdown(visualEditor.innerHTML));
            imageFiles.forEach((file, name) => zip.file(name, file));
            const content = await zip.generateAsync({type:"blob"});
            const a = document.createElement("a");
            a.href = URL.createObjectURL(content);
            a.download = "projet.zip";
            a.click();
        }

        function copyMarkdown() {
            const text = document.getElementById('markdownArea').textContent;
            navigator.clipboard.writeText(text).then(() => {
                document.getElementById('btnCopyMd').textContent = "Copié !";
                setTimeout(() => document.getElementById('btnCopyMd').textContent = "Copier", 2000);
            });
        }

        function formatHTML(html) {
            let tab = '  '; let result = ''; let indent= '';
            html.split(/>\s*</).forEach(function(element) {
                if (element.match(/^\/\w/)) indent = indent.substring(tab.length);
                result += indent + '<' + element + '>\n';
                if (element.match(/^<?\w[^>]*[^\/]$/) && !element.startsWith("input") && !element.startsWith("img") && !element.startsWith("iframe") && !element.startsWith("br")) indent += tab;
            });
            return result.substring(1, result.length-3);
        }

        function updateStats() {
            const text = visualEditor.innerText || "";
            document.getElementById('wordCount').textContent = `${text.trim() ? text.trim().split(/\s+/).length : 0} mots`;
            const size = new Blob([htmlInput.value]).size;
            codeSizeDisplay.textContent = size < 1024 ? `${size} B` : `${(size/1024).toFixed(1)} KB`;
        }

        function toggleDarkMode() {
            document.body.classList.toggle('dark-mode');
            const isDark = document.body.classList.contains('dark-mode');
            document.getElementById('themeIcon').innerHTML = isDark 
                ? '<path d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m0-11.314l.707.707m11.314 11.314l.707-.707M12 8a4 4 0 1 0 0 8 4 4 0 0 0 0-8z"></path>' 
                : '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>';
        }

        window.onload = () => {
            const draft = localStorage.getItem('html_studio_v2.9_final');
            if (draft) visualEditor.innerHTML = draft;
            else visualEditor.innerHTML = `<h1 style="text-align: center;">Correction des Modales</h1><p style="text-align: center;">Cliquez sur la caméra rouge pour tester la vidéo YouTube sans aucun "trouble".</p>`;
            syncToCode();
            updateStats();
        };

        visualEditor.addEventListener('scroll', updateResizerPosition);
        document.addEventListener('keydown', (e) => {
            if (selectedElement && (e.key === 'Delete' || e.key === 'Backspace')) {
                e.preventDefault();
                selectedElement.remove();
                selectedElement = null;
                resizer.style.display = 'none';
                syncToCode();
            }
        });
    </script>
</body>
</html>
