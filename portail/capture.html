<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Capture & Annotation Express | Gilles Cormi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --bg-glass: rgba(255, 255, 255, 0.85);
            --border-glass: rgba(255, 255, 255, 0.3);
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #f8fafc 0%, #eef2ff 100%);
            min-height: 100vh;
            overflow-x: hidden;
        }

        .font-display { font-family: 'Outfit', sans-serif; }

        .glass-panel {
            background: var(--bg-glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border-glass);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.08);
        }

        .canvas-container {
            max-height: calc(100vh - 250px);
            overflow: auto;
            background: #cbd5e1;
            background-image: radial-gradient(#94a3b8 1px, transparent 1px);
            background-size: 20px 20px;
        }

        canvas {
            display: block;
            margin: 0 auto;
            box-shadow: 0 20px 70px rgba(0,0,0,0.15);
            cursor: crosshair;
            background: white;
            transition: transform 0.2s ease;
        }

        .tool-btn {
            @apply w-10 h-10 rounded-xl flex items-center justify-center transition-all duration-200 border border-slate-200 bg-white text-slate-600 hover:text-indigo-600 hover:border-indigo-400 hover:shadow-lg hover:shadow-indigo-500/10;
        }

        .tool-btn.active {
            @apply bg-indigo-600 border-indigo-600 text-white shadow-lg shadow-indigo-500/30;
        }

        .capture-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.4);
            z-index: 1000;
            display: none;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(4px);
        }

        .capture-video-preview {
            max-width: 90%;
            max-height: 80%;
            border-radius: 12px;
            box-shadow: 0 0 100px rgba(0,0,0,0.5);
            border: 4px solid white;
        }

        .btn-capture {
            background: linear-gradient(135deg, #4f46e5, #4338ca);
            @apply text-white px-6 py-3 rounded-2xl font-bold shadow-xl shadow-indigo-500/30 active:scale-95 transition-all text-sm uppercase tracking-wider flex items-center gap-3;
        }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: #1e293b;
            color: white;
            padding: 12px 24px;
            border-radius: 99px;
            font-size: 13px;
            font-weight: 600;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            z-index: 2000;
            transition: transform 0.4s cubic-bezier(0.19, 1, 0.22, 1);
        }
        .toast.show { transform: translateX(-50%) translateY(0); }

        /* Animation d'introduction */
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .f-up { animation: slideUp 0.6s ease-out forwards; }

        /* Context Menu Styles */
        .context-menu {
            position: fixed;
            z-index: 3000;
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            padding: 8px 0;
            min-width: 180px;
            display: none;
            border: 1px solid rgba(0,0,0,0.1);
            animation: fadeIn 0.15s ease-out;
        }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        .menu-item {
            padding: 10px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 13px;
            font-weight: 600;
            color: #1e293b;
            cursor: pointer;
            transition: all 0.2s;
        }
        .menu-item:hover { background: #f1f5f9; color: #4f46e5; }
        .menu-item i { width: 16px; font-size: 14px; opacity: 0.6; }
    </style>

</head>
<body class="p-4 md:p-8">

    <div class="max-w-6xl mx-auto flex flex-col gap-6">
        
        <!-- HEADER & TOOLBAR -->
        <header class="glass-panel rounded-3xl p-6 flex flex-wrap items-center justify-between gap-4 f-up">
            <div class="flex items-center gap-4">
                <div class="w-12 h-12 bg-indigo-600 rounded-2xl flex items-center justify-center text-white shadow-lg shadow-indigo-500/30">
                    <i class="fas fa-camera text-xl"></i>
                </div>
                <div>
                    <h1 class="font-display font-extrabold text-slate-900 text-xl tracking-tight leading-none mb-1">Capture Instantanée</h1>
                    <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest">Assistant Visuel · Gilles Cormi</p>
                </div>
            </div>

            <div class="flex items-center gap-2 bg-slate-100 p-1.5 rounded-2xl border border-slate-200">
                <button id="btn-select" class="tool-btn" title="Sélection de zone"><i class="fas fa-expand"></i></button>
                <div class="h-6 w-px bg-slate-300 mx-1"></div>
                <button id="btn-free" class="tool-btn active" title="Dessin libre"><i class="fas fa-pencil-alt"></i></button>
                <button id="btn-rect" class="tool-btn" title="Rectangle"><i class="far fa-square"></i></button>
                <button id="btn-arrow" class="tool-btn" title="Flèche"><i class="fas fa-long-arrow-alt-right"></i></button>
                <button id="btn-text" class="tool-btn" title="Texte"><i class="fas fa-font"></i></button>
                <div class="h-6 w-px bg-slate-300 mx-1"></div>
                <input type="color" id="color-picker" class="w-10 h-10 p-0.5 rounded-xl cursor-pointer border-none bg-transparent" value="#ef4444">
                <div class="h-6 w-px bg-slate-300 mx-1"></div>
                <button id="btn-clear" class="tool-btn hover:text-rose-500" title="Effacer tout"><i class="fas fa-trash-alt"></i></button>
            </div>

            <div class="flex items-center gap-3">
                <button id="btn-start-capture" class="btn-capture">
                    <i class="fas fa-desktop"></i>
                    <span>Nouvelle Capture</span>
                </button>
                <button id="btn-copy" class="w-12 h-12 rounded-2xl bg-emerald-50 text-emerald-600 border border-emerald-100 flex items-center justify-center hover:bg-emerald-600 hover:text-white transition-all shadow-md active:scale-90" title="Copier l'image (Ctrl+C)">
                    <i class="fas fa-copy"></i>
                </button>
            </div>
        </header>

        <!-- MAIN AREA -->
        <main class="flex-grow flex flex-col gap-4 f-up" style="animation-delay: 0.1s;">
            <div id="canvas-wrapper" class="canvas-container rounded-3xl border-4 border-white shadow-2xl relative">
                <canvas id="main-canvas"></canvas>
                <div id="empty-state" class="absolute inset-0 flex flex-col items-center justify-center text-slate-400 bg-slate-50">
                    <i class="fas fa-image text-4xl mb-4 opacity-20"></i>
                    <p class="font-bold text-sm tracking-wide">Lancez une capture pour commencer</p>
                    <p class="text-[10px] uppercase mt-2 opacity-60">Astuce : Vous pouvez aussi coller une image (Ctrl+V)</p>
                </div>
            </div>
        </main>
    </div>

    <!-- CAPTURE MODAL -->
    <div id="capture-overlay" class="capture-overlay">
        <div class="flex flex-col items-center gap-8 w-full max-w-4xl p-6">
            <div class="bg-white p-2 rounded-2xl shadow-2xl relative border-4 border-indigo-500">
                <video id="capture-video" class="capture-video-preview" autoplay playsinline></video>
                <div class="absolute -top-4 -right-4 bg-indigo-600 text-white px-4 py-1.5 rounded-full text-[10px] font-bold shadow-lg">Prévisualisation LIVE</div>
            </div>
            <div class="flex gap-4">
                <button id="btn-screenshot" class="bg-white text-indigo-700 px-8 py-4 rounded-2xl font-black shadow-2xl hover:bg-indigo-50 active:scale-95 transition-all text-xl uppercase tracking-tighter flex items-center gap-4">
                    <i class="fas fa-camera"></i>
                    Figer la capture
                </button>
                <button id="btn-cancel-capture" class="bg-white/10 text-white border border-white/20 px-8 py-4 rounded-2xl font-bold hover:bg-white/20 transition-all text-base uppercase tracking-wider">
                    Annuler
                </button>
            </div>
        </div>
    </div>

    <!-- CONTEXT MENU -->
    <div id="context-menu" class="context-menu">
        <div onclick="copyImage()" class="menu-item">
            <i class="fas fa-copy"></i> Copier l'image
        </div>
        <div onclick="downloadImage()" class="menu-item">
            <i class="fas fa-download"></i> Enregistrer l'image
        </div>
        <div class="h-px bg-slate-100 my-1"></div>
        <div onclick="hideMenu()" class="menu-item text-slate-400">
            <i class="fas fa-times"></i> Annuler
        </div>
    </div>

    <!-- TOAST -->
    <div id="toast" class="toast">Image copiée !</div>

    <script>
        const canvas = document.getElementById('main-canvas');
        const ctx = canvas.getContext('2d');
        const wrapper = document.getElementById('canvas-wrapper');
        const emptyState = document.getElementById('empty-state');
        const colorPicker = document.getElementById('color-picker');
        
        let isDrawing = false;
        let startX, startY;
        let tool = 'free'; // free, rect, arrow, text
        let snapshot = null;
        let currentDrawings = [];

        // --- CAPTURE SCREEN ---
        const startBtn = document.getElementById('btn-start-capture');
        const overlay = document.getElementById('capture-overlay');
        const video = document.getElementById('capture-video');
        const screenshotBtn = document.getElementById('btn-screenshot');
        const cancelBtn = document.getElementById('btn-cancel-capture');
        let stream = null;

        async function startCapture() {
            try {
                stream = await navigator.mediaDevices.getDisplayMedia({
                    video: { cursor: "always" },
                    audio: false
                });
                video.srcObject = stream;
                overlay.style.display = 'flex';
                emptyState.style.display = 'none';
            } catch (err) {
                console.error("Erreur capture:", err);
            }
        }

        function takeScreenshot() {
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            stopCapture();
            saveSnapshot();
        }

        function stopCapture() {
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
            }
            overlay.style.display = 'none';
        }

        startBtn.onclick = startCapture;
        screenshotBtn.onclick = takeScreenshot;
        cancelBtn.onclick = stopCapture;

        // --- DRAWING LOGIC ---
        function setTool(newTool, btnEl) {
            tool = newTool;
            document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
            btnEl.classList.add('active');
            canvas.style.cursor = (newTool === 'select') ? 'crosshair' : 'default';
        }

        document.getElementById('btn-select').onclick = (e) => setTool('select', e.currentTarget);
        document.getElementById('btn-free').onclick = (e) => setTool('free', e.currentTarget);
        document.getElementById('btn-rect').onclick = (e) => setTool('rect', e.currentTarget);
        document.getElementById('btn-arrow').onclick = (e) => setTool('arrow', e.currentTarget);
        document.getElementById('btn-text').onclick = (e) => setTool('text', e.currentTarget);

        function saveSnapshot() {
            snapshot = ctx.getImageData(0, 0, canvas.width, canvas.height);
        }

        canvas.onmousedown = (e) => {
            if (!snapshot || e.button === 2) return;
            isDrawing = true;
            startX = e.offsetX;
            startY = e.offsetY;
            ctx.strokeStyle = colorPicker.value;
            ctx.fillStyle = colorPicker.value;
            ctx.lineWidth = 4;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            if (tool !== 'select') saveSnapshot();
        };

        canvas.onmousemove = (e) => {
            if (!isDrawing) return;
            
            const currentX = e.offsetX;
            const currentY = e.offsetY;

            if (tool === 'free') {
                ctx.lineTo(currentX, currentY);
                ctx.stroke();
                saveSnapshot(); 
            } else {
                ctx.putImageData(snapshot, 0, 0);
                if (tool === 'rect') {
                    ctx.strokeRect(startX, startY, currentX - startX, currentY - startY);
                } else if (tool === 'arrow') {
                    drawArrow(startX, startY, currentX, currentY);
                } else if (tool === 'select') {
                    ctx.fillStyle = 'rgba(79, 70, 229, 0.15)';
                    ctx.fillRect(startX, startY, currentX - startX, currentY - startY);
                    ctx.strokeStyle = '#4f46e5';
                    ctx.setLineDash([5, 5]);
                    ctx.strokeRect(startX, startY, currentX - startX, currentY - startY);
                    ctx.setLineDash([]);
                }
            }
        };

        canvas.onmouseup = (e) => {
            if (!isDrawing) return;
            
            if (tool === 'select') {
                const endX = e.offsetX;
                const endY = e.offsetY;
                const width = Math.abs(endX - startX);
                const height = Math.abs(endY - startY);
                
                if (width > 5 && height > 5) {
                    cropCanvas(Math.min(startX, endX), Math.min(startY, endY), width, height);
                } else {
                    ctx.putImageData(snapshot, 0, 0); 
                }
            } else if (tool === 'text') {
                const text = prompt("Texte à insérer :");
                if (text) {
                    ctx.font = 'bold 32px Outfit, sans-serif';
                    ctx.fillText(text, startX, startY);
                }
            }
            
            isDrawing = false;
            saveSnapshot();
        };

        function cropCanvas(x, y, w, h) {
            const imgData = ctx.getImageData(x, y, w, h);
            canvas.width = w;
            canvas.height = h;
            ctx.putImageData(imgData, 0, 0);
            saveSnapshot();
            showToast("Zone recadrée ! Clic droit pour copier.");
        }

        // --- CONTEXT MENU ---
        const menu = document.getElementById('context-menu');
        canvas.oncontextmenu = (e) => {
            e.preventDefault();
            if (!snapshot) return;
            menu.style.display = 'block';
            menu.style.left = e.pageX + 'px';
            menu.style.top = e.pageY + 'px';
        };

        window.onclick = hideMenu;
        function hideMenu() { menu.style.display = 'none'; }

        async function copyImage() {
            try {
                canvas.toBlob(async (blob) => {
                    const item = new ClipboardItem({ "image/png": blob });
                    await navigator.clipboard.write([item]);
                    showToast("Copié dans le presse-papier !");
                });
            } catch (err) { console.error(err); }
        }

        function downloadImage() {
            const link = document.createElement('a');
            link.download = `capture-${Date.now()}.png`;
            link.href = canvas.toDataURL();
            link.click();
        }

        function drawArrow(fromx, fromy, tox, toy) {
            const headlen = 15;
            const dx = tox - fromx;
            const dy = toy - fromy;
            const angle = Math.atan2(dy, dx);
            ctx.beginPath();
            ctx.moveTo(fromx, fromy);
            ctx.lineTo(tox, toy);
            ctx.lineTo(tox - headlen * Math.cos(angle - Math.PI / 6), toy - headlen * Math.sin(angle - Math.PI / 6));
            ctx.moveTo(tox, toy);
            ctx.lineTo(tox - headlen * Math.cos(angle + Math.PI / 6), toy - headlen * Math.sin(angle + Math.PI / 6));
            ctx.stroke();
        }

        // --- UTILS ---
        document.getElementById('btn-clear').onclick = () => {
            if (confirm("Effacer tout ?")) {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                snapshot = null;
                emptyState.style.display = 'flex';
            }
        };

        document.getElementById('btn-copy').onclick = copyImage;

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }

        // --- PASTE SUPPORT ---
        window.addEventListener('paste', e => {
            const items = e.clipboardData.items;
            for (let i = 0; i < items.length; i++) {
                if (items[i].type.indexOf('image') !== -1) {
                    const blob = items[i].getAsFile();
                    const img = new Image();
                    img.onload = () => {
                        canvas.width = img.width;
                        canvas.height = img.height;
                        ctx.drawImage(img, 0, 0);
                        emptyState.style.display = 'none';
                        saveSnapshot();
                    };
                    img.src = URL.createObjectURL(blob);
                }
            }
        });

        // Shortcuts
        document.onkeydown = (e) => {
            if (e.ctrlKey && e.key === 'c') copyImage();
            if (e.key === 'Delete' || e.key === 'Backspace') document.getElementById('btn-clear').click();
        };
    </script>
</body>
</html>
